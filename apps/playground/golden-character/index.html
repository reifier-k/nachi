<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#071018" />
    <link rel="icon" href="data:," />
    <title>Nachi Golden Character</title>
  </head>
  <body>
    <main id="app">
      <section class="hud">
        <p class="eyebrow">Golden effect #6</p>
        <h1>Character attached</h1>
        <dl>
          <div>
            <dt>Backend</dt>
            <dd id="backend-value">Initializing…</dd>
          </div>
          <div>
            <dt>Mode</dt>
            <dd id="mode-value">--</dd>
          </div>
          <div>
            <dt>Status</dt>
            <dd id="status-value">Initializing…</dd>
          </div>
        </dl>
      </section>
      <div id="scene" role="img" aria-label="Character-attached golden effect">
        <canvas id="golden-character" width="640" height="640"></canvas>
        <canvas
          id="golden-character-ring"
          width="320"
          height="320"
          aria-label="Socket ring isolation readback"
        ></canvas>
      </div>
    </main>
    <script type="module" src="/src/golden-character.ts"></script>
  </body>
</html>
