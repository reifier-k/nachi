<!doctype html>
<html lang="en">
  <head>

    <meta name="theme-color" content="#07111f" />
    <link rel="icon" href="data:," />
    <title>Three r185 Readback Drain Reproduction</title>

      :root {
        color: #dff7ff;

        background: #0b1c2f;

      dt {
        color: #7fc9df;
      }

        margin: 0 0 0.8rem;
      }

  <body>
    <main>
      <p>Three r185 · offscreen WebGPU readback reproduction</p>
      <h1>First full-size readback after a frame gap</h1>
      <dl>
        <dt>Drain mode</dt>
        <dd id="drain-value">initializing</dd>
        <dt>Frames</dt>
        <dd id="frames-value">--</dd>
        <dt>Result</dt>
        <dd id="status-value">initializing</dd>
      </dl>

    <script type="module" src="/src/repro-readback.ts"></script>
