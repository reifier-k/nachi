<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050711" />
    <link rel="icon" href="data:," />
    <title>Nachi Golden Explosion</title>
  </head>
  <body>
    <main id="app">
      <section class="hud">
        <p class="eyebrow">Golden effect #2</p>
        <h1>Explosion</h1>
        <dl>
          <div>
            <dt>Backend</dt>
            <dd id="backend-value">Initializing…</dd>
          </div>
          <div>
            <dt>Mode</dt>
            <dd id="mode-value">--</dd>
          </div>
          <div>
            <dt>Status</dt>
            <dd id="status-value">Initializing…</dd>
          </div>
        </dl>
      </section>
      <div id="scene" role="img" aria-label="Golden explosion scene"></div>
      <section id="readback-gallery" aria-label="Golden explosion readback frames">
        <canvas id="golden-early" width="320" height="240"></canvas>
        <canvas id="golden-peak" width="320" height="240"></canvas>
        <canvas id="golden-late" width="320" height="240"></canvas>
      </section>
    </main>
    <script type="module" src="/src/golden-explosion.ts"></script>
  </body>
</html>
