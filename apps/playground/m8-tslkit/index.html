<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070a16" />
    <link rel="icon" href="data:," />
    <title>Nachi M8 TSL Kit Smoke</title>
  </head>
  <body>
    <main id="app">
      <section class="hud">
        <p class="eyebrow">M8 GPU smoke · standalone package</p>
        <h1>TSL shader kit</h1>
        <dl>
          <div>
            <dt>Backend</dt>
            <dd id="backend-value">Initializing…</dd>
          </div>
          <div>
            <dt>Path</dt>
            <dd>Offscreen RT → readback → 2D</dd>
          </div>
          <div>
            <dt>Status</dt>
            <dd id="status-value">Initializing…</dd>
          </div>
        </dl>
      </section>
      <section class="visual-shell">
        <canvas
          id="tslkit-visual"
          width="448"
          height="64"
          aria-label="Seven TSL kit GPU smoke panels"
        ></canvas>
        <div class="labels" aria-hidden="true">
          <span>dissolve</span><span>uvFlow</span><span>polarUV</span><span>fresnel</span
          ><span>rimLight</span><span>distortion</span><span>flowMap</span>
        </div>
      </section>
    </main>
    <script type="module" src="/src/m8-tslkit.ts"></script>
  </body>
</html>
