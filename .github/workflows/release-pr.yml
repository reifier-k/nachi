name: Version Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: version-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    name: Create or update release PR
    if: ${{ github.repository == 'reifier-k/nachi' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update release PR
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm version-packages
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
          commitMode: github-api

      - name: Run checks for release PR
        if: ${{ steps.changesets.outputs.pullRequestNumber != '' }}
        env:
          BASE_REF: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: changeset-release/${{ github.ref_name }}
        run: |
          gh workflow run ci.yml --ref "$RELEASE_BRANCH"
          gh workflow run security.yml --ref "$RELEASE_BRANCH" \
            --field base_ref="$BASE_REF" \
            --field head_ref="$RELEASE_BRANCH"
